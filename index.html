<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteFlow - Voter Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="voter-page">
    <div class="container">
        <div class="card login-card">
            <div class="login-title">🗳️ VoteFlow</div>
            
            <div id="alert" class="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="voterId">Voter ID</label>
                    <input type="text" id="voterId" name="voterId" placeholder="Enter your Voter ID (e.g., V001)" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </div>
            </form>
            
            <div class="login-footer">
                Want to view results?
                <a href="results.html">View Results</a>
            </div>
            
            <div class="login-footer">
                Admin panel?
                <a href="admin-login.html">Admin Login</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const voterId = document.getElementById('voterId').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Validation
            if (!voterId || !password) {
                UI.showAlert('Please fill in all fields.', 'error');
                return;
            }
            
            // Attempt login
            const result = Auth.voterLogin(voterId, password);
            
            if (result.success) {
                UI.showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'voter.html';
                }, 1500);
            } else {
                UI.showAlert(result.message, 'error');
            }
        });
    </script>
</body>
</html>
