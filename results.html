<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteFlow - Live Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="voter-page">
    <header>
        <div class="header-content">
            <div class="header-logo">🗳️ VoteFlow</div>
            <div class="header-info">
                <div class="header-user">📊 Live Results</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="alert" class="alert"></div>
        
        <div class="results-container">
            <div class="results-header">
                <h2 class="results-title">Live Voting Results</h2>
                <div class="total-votes" id="totalVotesDisplay">Total Votes: <strong>0</strong></div>
            </div>
            
            <div id="resultsContent">
                <div style="text-align: center; padding: 40px; color: #666;">
                    <p>Loading results...</p>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-primary" id="refreshBtn">🔄 Refresh Results</button>
                <button class="btn btn-secondary" id="autoRefreshToggle">⏱️ Enable Auto-Refresh (30s)</button>
            </div>
        </div>
        
        <!-- Navigation Links -->
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 600; margin: 0 15px;">🗳️ Voter Login</a>
            <a href="admin-login.html" style="color: white; text-decoration: none; font-weight: 600; margin: 0 15px;">🔐 Admin Panel</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let autoRefreshActive = false;
        let refreshInterval = null;

        // Load results on page load
        window.addEventListener('load', async function() {
            await Candidates.loadCandidates();
            displayResults();
        });

        // Display results
        async function displayResults() {
            const results = await Voting.getResults();
            const container = document.getElementById('resultsContent');
            const totalVotes = Voting.getTotalVotes();
            
            // Update total votes
            document.getElementById('totalVotesDisplay').innerHTML = `Total Votes: <strong>${totalVotes}</strong>`;
            
            if (results.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;"><p>No candidates available yet.</p></div>';
                return;
            }
            
            // Calculate max votes for bar width
            const maxVotes = Math.max(...results.map(c => c.voteCount), 1);
            let resultsHTML = '<div class="results-list">';
            
            results.forEach((candidate, index) => {
                const percentage = (candidate.voteCount / maxVotes) * 100;
                const isLeading = index === 0 && candidate.voteCount > 0;
                const divClass = isLeading ? 'result-item leading-candidate' : 'result-item';
                
                const leaderBadge = isLeading ? '<span class="leader-badge">🏆 LEADING</span>' : '';
                const rankEmoji = index < 3 ? ['🥇', '🥈', '🥉'][index] : '•';
                
                resultsHTML += `
                    <div class="${divClass}">
                        <div class="candidate-rank">${rankEmoji}</div>
                        <div class="result-info">
                            <div class="result-name">${candidate.name} ${leaderBadge}</div>
                            <div class="result-bar-container">
                                <div class="result-bar" style="width: ${percentage}%;">
                                    ${candidate.voteCount > 0 ? candidate.voteCount : ''}
                                </div>
                            </div>
                        </div>
                        <div class="result-count">${candidate.voteCount} ${candidate.voteCount === 1 ? 'vote' : 'votes'}</div>
                    </div>
                `;
            });
            
            resultsHTML += '</div>';
            container.innerHTML = resultsHTML;
        }

        // Manual refresh
        document.getElementById('refreshBtn').addEventListener('click', function() {
            displayResults();
            UI.showAlert('Results refreshed!', 'success');
        });

        // Auto-refresh toggle
        document.getElementById('autoRefreshToggle').addEventListener('click', function() {
            autoRefreshActive = !autoRefreshActive;
            
            if (autoRefreshActive) {
                document.getElementById('autoRefreshToggle').classList.add('btn-primary');
                document.getElementById('autoRefreshToggle').classList.remove('btn-secondary');
                document.getElementById('autoRefreshToggle').textContent = '⏸️ Disable Auto-Refresh';
                
                // Refresh every 30 seconds
                refreshInterval = setInterval(displayResults, 30000);
                UI.showAlert('Auto-refresh enabled (every 30 seconds)', 'info');
            } else {
                document.getElementById('autoRefreshToggle').classList.remove('btn-primary');
                document.getElementById('autoRefreshToggle').classList.add('btn-secondary');
                document.getElementById('autoRefreshToggle').textContent = '⏱️ Enable Auto-Refresh (30s)';
                
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                }
                UI.showAlert('Auto-refresh disabled', 'info');
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
